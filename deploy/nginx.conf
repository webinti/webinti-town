# /etc/nginx/sites-available/webinti-town
# Symlink: sudo ln -s /etc/nginx/sites-available/webinti-town /etc/nginx/sites-enabled/
# Reload:  sudo nginx -t && sudo systemctl reload nginx
#
# Assumes certbot has provisioned a cert for live.webinti.com
# (sudo certbot --nginx -d live.webinti.com).

# Increase WebSocket upgrade timeouts to keep LiveKit + Socket.IO connections alive.
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name live.webinti.com;

    # Let certbot handle the redirect after first run.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name live.webinti.com;

    # certbot will fill these in
    ssl_certificate /etc/letsencrypt/live/live.webinti.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/live.webinti.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ----- Static client (Vite build) -----
    root /var/www/webinti-town/client;
    index index.html;

    # Cache the hashed assets aggressively.
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        access_log off;
    }

    # Tilemap, sprites — moderate cache so map edits show up.
    location /maps/ {
        try_files $uri =404;
        expires 1h;
    }

    # SPA fallback for the (currently single) React app.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- Socket.IO (Node server :3001) -----
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ----- REST API (Node server :3001) -----
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----- LiveKit signaling (WebSocket to :7880) -----
    # LiveKit serves its signaling WS on the root of port 7880.
    # We expose it at /livekit so clients connect via wss://live.webinti.com/livekit
    location /livekit {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Reasonable upload size for whiteboard payloads / future asset uploads.
    client_max_body_size 5m;
}
